    declarations:
    - name: sim_thread_count
      min_val: 3
      max_val: 4

    - name: core_crypt_seed
      min_val: 1
      max_val: 4294967295

    - name: core_ram_seed
      min_val: 1
      max_val: 4294967295

    - name: core_memory_nonlinear_seed
      min_val: 1
      max_val: 4294967295

    - name: ebpf_crypt_seed
      min_val: 1
      max_val: 4294967295

    - name: alu64_add_k
      min_val: 0
      max_val: 255

    - name: alu64_add_x
      min_val: 0
      max_val: 255

    - name: alu64_sub_k
      min_val: 0
